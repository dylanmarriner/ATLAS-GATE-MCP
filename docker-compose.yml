version: '3.8'

services:
  # ATLAS-GATE HTTP Server
  atlas-gate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-gate-http
    ports:
      - "${ATLAS_GATE_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${ENVIRONMENT:-development}
      ATLAS_GATE_HOST: 0.0.0.0
      ATLAS_GATE_PORT: 3000
      ATLAS_GATE_DATA_DIR: /data
    volumes:
      - atlas-gate-data:/data
      - atlas-gate-logs:/var/log/atlas-gate
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount repositories (adjust paths as needed)
      - ${REPOS_PATH:-/tmp/repos}:/repositories:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - atlas-gate-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Nginx Reverse Proxy (Optional - for HTTPS)
  nginx:
    image: nginx:latest
    container_name: atlas-gate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - atlas-gate-logs:/var/log/nginx
    depends_on:
      - atlas-gate
    restart: unless-stopped
    networks:
      - atlas-gate-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  atlas-gate-data:
    driver: local
  atlas-gate-logs:
    driver: local

networks:
  atlas-gate-network:
    driver: bridge
