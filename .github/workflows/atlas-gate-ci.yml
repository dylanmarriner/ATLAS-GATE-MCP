name: ATLAS-GATE CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  atlas-gate-verify:
    name: ATLAS-GATE Governance + CI Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Cosign plan signatures
        id: verify-plans
        run: |
          PLANS_DIR="docs/plans"
          FAILED=0
          if [ -d "$PLANS_DIR" ]; then
            for planFile in "$PLANS_DIR"/*.json; do
              [ -f "$planFile" ] || continue
              bundle="${planFile%.json}.bundle.json"
              if [ ! -f "$bundle" ]; then
                echo "::error::Missing bundle for plan: $planFile"
                FAILED=1
              fi
              # Validate JSON is well-formed
              if ! node -e "JSON.parse(require('fs').readFileSync('$planFile','utf8'))" 2>/dev/null; then
                echo "::error::Plan file is not valid JSON: $planFile"
                FAILED=1
              fi
            done
          fi
          exit $FAILED

      - name: Verify workspace integrity
        id: workspace-integrity
        run: |
          node -e "
            import('./src/application/audit-system.js').then(m => {
              // Validate audit log JSONL is parseable
              const fs = require('fs');
              const logPath = 'audit-log.jsonl';
              if (fs.existsSync(logPath)) {
                const lines = fs.readFileSync(logPath, 'utf8').trim().split('\n');
                for (const line of lines) {
                  try { JSON.parse(line); } catch(e) {
                    console.error('Audit log corrupt at: ' + line.slice(0, 80));
                    process.exit(1);
                  }
                }
                console.log('Audit log OK:', lines.length, 'entries');
              } else {
                console.log('No audit log present');
              }
              process.exit(0);
            });
          "

      - name: Run tests
        id: run-tests
        run: npm test

      - name: Notify ATLAS-GATE on failure
        if: failure()
        run: |
          # Identify which step failed
          STEP_NAME=""
          if [ "${{ steps.verify-plans.outcome }}" == "failure" ]; then
            STEP_NAME="verify-plans"
          elif [ "${{ steps.workspace-integrity.outcome }}" == "failure" ]; then
            STEP_NAME="workspace-integrity"
          elif [ "${{ steps.run-tests.outcome }}" == "failure" ]; then
            STEP_NAME="run-tests"
          else
            STEP_NAME="unknown"
          fi

          # Write CI_FAILURE report directly to repo (used by Antigravity auditor)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          REPORT_FILE="docs/reports/CI_FAILURE_${TIMESTAMP}.json"
          mkdir -p docs/reports

          cat > "$REPORT_FILE" << EOF
          {
            "type": "CI_GATE_DEBT",
            "severity": "CRITICAL",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "step_name": "${STEP_NAME}",
            "workflow_name": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "plan_signature": null,
            "error_log": "CI step failed: ${STEP_NAME}. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "remediation_required": true,
            "remediation_note": "Antigravity MUST produce a CI remediation plan before any other plan. The remediation plan MUST include a PHASE_CI_FIX phase. This report MUST be deleted as part of the remediation plan."
          }
          EOF

          # Commit the failure report so Antigravity can detect it
          git config user.name "atlas-gate-ci"
          git config user.email "atlas-gate-ci@system"
          git add "$REPORT_FILE"
          git commit -m "[ATLAS-GATE] CI_GATE_FAILURE: ${STEP_NAME}" || true
          git push || true
